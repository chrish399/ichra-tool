<svg width="1200" height="350" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient (Aflac blues) -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0088B8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00A7E1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C4FF;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle pattern overlay -->
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.1)"/>
    </pattern>
  </defs>
  
  <!-- Main background -->
  <rect width="1200" height="350" fill="url(#bgGradient)"/>
  <rect width="1200" height="350" fill="url(#dots)"/>
  
  <!-- Abstract decorative circles (Aflac style) -->
  <circle cx="100" cy="280" r="120" fill="rgba(255,255,255,0.08)"/>
  <circle cx="1100" cy="70" r="90" fill="rgba(255,255,255,0.08)"/>
  <circle cx="950" cy="300" r="60" fill="rgba(248,151,40,0.15)"/>
  
  <!-- Health/Benefits Icons (repositioned to avoid text overlap) -->
  <!-- Medical cross icon - top left -->
  <g transform="translate(100, 60)">
    <circle cx="0" cy="0" r="40" fill="rgba(255,255,255,0.15)"/>
    <rect x="-18" y="-5" width="36" height="10" rx="2" fill="white"/>
    <rect x="-5" y="-18" width="10" height="36" rx="2" fill="white"/>
  </g>
  
  <!-- Shield/Protection icon - left side, lower -->
  <g transform="translate(80, 260)">
    <path d="M 0,-30 L 22,-22 L 22,8 Q 22,28 0,38 Q -22,28 -22,8 L -22,-22 Z" 
          fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
    <path d="M -7,4 L -2,10 L 9,-7" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- People/Team icon - top right -->
  <g transform="translate(1100, 70)">
    <circle cx="-18" cy="-8" r="11" fill="rgba(255,255,255,0.15)"/>
    <ellipse cx="-18" cy="13" rx="16" ry="11" fill="rgba(255,255,255,0.15)"/>
    <circle cx="13" cy="-8" r="11" fill="rgba(248,151,40,0.25)"/>
    <ellipse cx="13" cy="13" rx="16" ry="11" fill="rgba(248,151,40,0.25)"/>
  </g>
  
  <!-- Dollar/Benefits icon - bottom right -->
  <g transform="translate(1080, 280)">
    <circle cx="0" cy="0" r="35" fill="rgba(248,151,40,0.2)" stroke="rgba(248,151,40,0.4)" stroke-width="2"/>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="40" font-weight="700" 
          fill="white" text-anchor="middle">$</text>
  </g>
  
  <!-- Main headline -->
  <text x="600" y="140" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700" 
        fill="white" text-anchor="middle">
    ICHRA Qualification Tool
  </text>
  
  <!-- Subheadline -->
  <text x="600" y="190" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="400" 
        fill="rgba(255,255,255,0.95)" text-anchor="middle">
    Find out if Individual Coverage Health Reimbursement is right for your business
  </text>
  
  <!-- Badge text (no backgrounds) -->
  <g transform="translate(600, 240)">
    <!-- 5 Questions -->
    <text x="-180" y="0" font-family="Arial, sans-serif" font-size="16" font-weight="600" 
          fill="white" text-anchor="middle">✓ 5 Questions</text>
    
    <!-- 2 Minutes -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" font-weight="600" 
          fill="white" text-anchor="middle">✓ 2 Minutes</text>
    
    <!-- Free Assessment -->
    <text x="180" y="0" font-family="Arial, sans-serif" font-size="16" font-weight="600" 
          fill="rgba(248,151,40,1)" text-anchor="middle">✓ Free Assessment</text>
  </g>
</svg>
